<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ff758c">

<title>I'm Really Sorry My Baby Girl ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;
    width:100%;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    text-align:center;
    color:white;
    overflow-x:hidden;
    position:relative;
}

.container{
    width:100%;
    max-width:700px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius:25px;
    padding:35px 20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
    z-index:2;
    animation:fadeIn 1s ease;
}

h1{
    font-size:clamp(2rem,7vw,4rem);
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

p{
    font-size:clamp(1rem,4vw,1.4rem);
    line-height:1.8;
    margin-bottom:35px;
}

.buttons{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    width:100%;
}

button{
    border:none;
    padding:15px 25px;
    border-radius:50px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s ease;
    width:100%;
    max-width:280px;
}

#yesBtn{
    background:white;
    color:#ff4f81;
}

#yesBtn:hover{
    transform:scale(1.05);
}

#maybeBtn{
    background:#ffe082;
    color:black;
}

#noBtn{
    background:#ff1744;
    color:white;
}

#message{
    margin-top:25px;
    font-size:clamp(1rem,4vw,1.5rem);
    line-height:1.6;
    animation:fadeIn 1s ease;
}

.hidden{
    display:none;
}

.heart{
    position:fixed;
    bottom:-20px;
    color:red;
    animation:floatUp 5s linear forwards;
    pointer-events:none;
    z-index:1;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(min-width:700px){

    .buttons{
        flex-direction:row;
        justify-content:center;
        flex-wrap:wrap;
    }

    button{
        width:auto;
        min-width:180px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>I'm Really Sorry My Baby Girl ❤️</h1>

    <p>
        I know I made mistakes... 🥺<br><br>
        But losing your smile hurts more than anything ❤️<br><br>
        You mean everything to me my babyy garrll❤️.<br>
        Please forgive me my cutieee ❤️😭
    </p>

    <div class="buttons">
        <button id="yesBtn">Forgive Me ❤️</button>
        <button id="maybeBtn">Maybe 🤔</button>
        <button id="noBtn">Still Angry 😒</button>
    </div>

    <div id="message" class="hidden"></div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const maybeBtn = document.getElementById("maybeBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

maybeBtn.addEventListener("click", ()=>{

    message.classList.remove("hidden");

    message.innerHTML =
    "I promise to do better, love you more, and always make you smile ❤️🥺";
});

noBtn.addEventListener("click", ()=>{

    message.classList.remove("hidden");

    message.innerHTML =
    "Okay 😭 but I'll keep trying until you smile again ❤️";
});

yesBtn.addEventListener("click", ()=>{

    message.classList.remove("hidden");

    message.innerHTML =
    "❤️🥺 THANK YOUUUU MY BABYYY ❤️✨<br><br>I love you foreverrrrr 😭";

    createHearts();
});

function createHearts(){

    setInterval(()=>{

        const heart = document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";

        heart.style.fontSize =
        (Math.random() * 20 + 20) + "px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },5000);

    },250);
}

</script>

</body>
</html>
