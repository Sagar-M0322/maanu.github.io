<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Really Sorry My Babby Gaarrll ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    text-align:center;
    color:white;
}

.container{
    width:100%;
    max-width:700px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border-radius:25px;
    padding:40px 25px;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
    animation:fadeIn 1s ease;
}

h1{
    font-size:clamp(2rem,6vw,4rem);
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

p{
    font-size:clamp(1rem,3vw,1.4rem);
    line-height:1.8;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    position:relative;
    min-height:120px;
}

button{
    border:none;
    padding:14px 26px;
    border-radius:50px;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

#yesBtn{
    background:white;
    color:#ff4f81;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#maybeBtn{
    background:#ffe082;
    color:black;
}

#noBtn{
    background:#ff1744;
    color:white;
    position:absolute;
}

#message{
    margin-top:25px;
    font-size:clamp(1rem,4vw,1.5rem);
    animation:fadeIn 1s ease;
}

.hidden{
    display:none;
}

.heart{
    position:fixed;
    bottom:-20px;
    color:red;
    animation:floatUp 5s linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:500px){

    .container{
        padding:30px 20px;
    }

    button{
        width:100%;
        max-width:250px;
    }

    #noBtn{
        position:relative;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>I'm Really Sorry My Baabyy Garlll❤️</h1>

    <p>
        I know I made mistakes...<br><br>
        But losing your smile hurts more than anything 🥺<br><br>
        You mean everything to me 🥺❤️<br>
        Can you please forgive me?
    </p>

    <div class="buttons">
        <button id="yesBtn">Forgive Me ❤️</button>
        <button id="maybeBtn">Maybe 🤔</button>
        <button id="noBtn">No 😒</button>
    </div>

    <div id="message" class="hidden"></div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const maybeBtn = document.getElementById("maybeBtn");
const message = document.getElementById("message");

function moveButton(){

    if(window.innerWidth < 500){
        return;
    }

    const container = document.querySelector(".buttons");

    const maxX = container.offsetWidth - noBtn.offsetWidth;
    const maxY = container.offsetHeight - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

maybeBtn.addEventListener("click", ()=>{

    message.classList.remove("hidden");

    message.innerHTML =
    "I promise to do better, love you more, and never stop making you smile ❤️";
});

yesBtn.addEventListener("click", ()=>{

    message.classList.remove("hidden");

    message.innerHTML =
    "❤️🥺 Thank you for forgiving me. I love you forever My cuttiieeffuull❤️😭 ✨";

    createHearts();
});

function createHearts(){

    setInterval(()=>{

        const heart = document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";

        heart.style.fontSize = (Math.random() * 20 + 20) + "px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },5000);

    },200);
}

</script>

</body>
</html>
